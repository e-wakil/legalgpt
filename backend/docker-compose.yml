version: '3.8'

services:
  db:
    # Use the pgvector image instead of standard postgres
    image: ankane/pgvector:v0.5.1
    container_name: legalgpt_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: legalgpt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: